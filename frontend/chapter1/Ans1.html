<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Autograder - Daily Life AI</title>
  <style>
    textarea { width: 100%; height: 120px; }
    .result { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <p>ให้นักเรียนยกตัวอย่างการใช้งาน AI ในชีวิตประจำวัน และอธิบายว่า AI นั้นช่วยปรับปรุงหรือแก้ปัญหาอะไรให้กับผู้ใช้บ้าง</p>
  <textarea id="answerInput"></textarea>
  <button onclick="submitAnswer()">ส่งคำตอบ</button>
  <div id="result" class="result"></div>

  <script>
    const API_URL = "https://ai-autograde-backend-1.onrender.com/api/grade";

    const IDEAL_ANSWER = `
AI คือศาสตร์ที่ทำให้เครื่องมีความฉลาด ส่วน ML เป็นส่วนหนึ่งของ AI ที่เรียนรู้จากข้อมูล 
และ DL เป็น ML ที่ใช้โครงข่ายประสาทเทียมที่มีหลายชั้น ระบบแนะนำวิดีโอบน YouTube หรือ TikTok ใช้ AI วิเคราะห์พฤติกรรมผู้ใช้
เพื่อเสนอเนื้อหาที่น่าจะสนใจ ช่วยให้ผู้ใช้ไม่ต้องเสียเวลาเลือก และรับประสบการณ์ตรงตามความสนใจ
AI ยังถูกใช้ในระบบแปลภาษาแบบเรียลไทม์ การช่วยเหลือในแอปนำทาง และผู้ช่วยเสียงอย่าง Siri หรือ Google Assistant
`;

    function submitAnswer() {
      const answer = document.getElementById("answerInput").value;
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ answer, ideal: IDEAL_ANSWER })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("result").innerText =
          `คะแนน: ${data.score} | Feedback: ${data.feedback}`;
        window.parent.postMessage(JSON.stringify({
          type: "grade",
          value: JSON.stringify(data)
        }), "*");
      });
    }

    window.AIGrader = {
      getState: () => {
        return JSON.stringify({ answer: document.getElementById("answerInput").value });
      },
      setState: stateStr => {
        const state = JSON.parse(stateStr);
        document.getElementById("answerInput").value = state.answer || "";
      },
      getGrade: () => {
        return JSON.stringify({ answer: document.getElementById("answerInput").value });
      }
    };
  </script>
</body>
</html>
